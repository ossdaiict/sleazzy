name: TLS Fix

on:
  push:
    branches:
      - ops/tls-fix
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Repoint Caddy to live container and enable TLS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            CF=/etc/caddy/Caddyfile
            BAK="${CF}.bak.$(date +%s)"
            cp "$CF" "$BAK"
            echo "Backed up current Caddyfile to $BAK"

            cat > "$CF" <<'EOF'
            gdgdau.cloud {
                reverse_proxy localhost:3006
            }

            sleazzy.gdgdau.cloud {
                reverse_proxy localhost:3006
            }

            api.sleazzy.gdgdau.cloud {
                reverse_proxy localhost:5000
            }

            lookinai.gdgdau.cloud {
                reverse_proxy localhost:8000
            }
            EOF

            echo "=== validating new Caddyfile ==="
            if ! caddy validate --config "$CF" --adapter caddyfile; then
              echo "VALIDATION FAILED - restoring backup"
              cp "$BAK" "$CF"
              exit 1
            fi

            echo "=== reloading caddy ==="
            systemctl reload caddy

            echo "=== active Caddyfile ==="
            cat "$CF"

            echo "=== waiting for apex cert + serving (up to 90s) ==="
            for i in $(seq 1 18); do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 8 -H 'Host: gdgdau.cloud' https://localhost --resolve gdgdau.cloud:443:127.0.0.1 -k 2>/dev/null || echo 000)
              echo "attempt $i: local https -> $code"
              if [ "$code" = "200" ]; then break; fi
              sleep 5
            done
            echo "=== DONE ==="
