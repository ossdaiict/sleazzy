name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sleazzy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sleazzy:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS(CD)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/sleazzy:latest"
            echo "Pulling latest image: $IMAGE"
            docker pull "$IMAGE"

            echo "Stopping and removing old container (if any)"
            docker rm -f sleazzy 2>/dev/null || true

            echo "Starting new container"
            docker run -d \
              --name sleazzy \
              --restart unless-stopped \
              --label com.centurylinklabs.watchtower.enable=false \
              -p 3006:3006 \
              -e NODE_ENV="production" \
              -e PORT="3006" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
              -e EMAILJS_SERVICE_ID="${{ secrets.EMAILJS_SERVICE_ID }}" \
              -e EMAILJS_TEMPLATE_ID="${{ secrets.EMAILJS_TEMPLATE_ID }}" \
              -e EMAILJS_PUBLIC_KEY="${{ secrets.EMAILJS_PUBLIC_KEY }}" \
              -e EMAILJS_PRIVATE_KEY="${{ secrets.EMAILJS_PRIVATE_KEY }}" \
              -e APPROVAL_NOTIFY_EMAIL="${{ secrets.APPROVAL_NOTIFY_EMAIL }}" \
              "$IMAGE"

            echo "Pruning old images"
            docker image prune -f

            echo "Deployment completed"
