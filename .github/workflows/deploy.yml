name: Build, Push to Docker Hub & Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sleazzy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sleazzy:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/sleazzy:latest"
            echo "Pulling latest image: $IMAGE"
            docker pull "$IMAGE"

            echo "Stopping and removing old container (if any)"
            docker rm -f sleazzy 2>/dev/null || true

            echo "Starting new container"
            docker run -d \
              --name sleazzy \
              --restart unless-stopped \
              -p 3006:3006 \
              --env-file /root/sleazzy/.env \
              "$IMAGE"

            echo "Pruning old images"
            docker image prune -f

            echo "Deployment completed"
